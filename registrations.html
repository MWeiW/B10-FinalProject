<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Registrations | HTW Campus Event and Workshop Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>HTW Campus Event and Workshop Hub</h1>
        <p>Manage the events you signed up for.</p>
        <nav aria-label="Main navigation">
            <ul id="main-navigation">
                <li><a href="index.html" data-nav-role="all">Events</a></li>
                <li><a href="event.html" data-nav-role="all">Event Details</a></li>
                <li><a href="registrations.html" data-nav-role="student">My Registrations</a></li>
                <li><a href="event-form.html" data-nav-role="organizer">Create Event</a></li>
                <li><a href="organizer.html" data-nav-role="organizer">Organizer Dashboard</a></li>
            </ul>
        </nav>
        <section class="role-switcher" aria-labelledby="role-switcher-heading">
            <h2 id="role-switcher-heading">Demo role</h2>
            <form id="role-switcher-form">
                <label for="role-select">Use the site as</label>
                <select id="role-select" name="role">
                    <option value="guest">Guest</option>
                    <option value="student">Student</option>
                    <option value="organizer">Organizer/Admin</option>
                </select>

                <label for="user-select">Demo user</label>
                <select id="user-select" name="username"></select>

                <button type="submit">Switch role</button>
            </form>
            <p id="current-role-message" aria-live="polite"></p>
        </section>
    </header>

    <main>
        <section aria-labelledby="registrations-heading">
            <h2 id="registrations-heading">My registrations</h2>
            <p>View, edit, or cancel your event sign-ups.</p>
            <div id="student-registrations-list" aria-live="polite"></div>
        </section>
    </main>

    <footer>
        <p>HTW Berlin B10 Final Project - Wing Wei Wong</p>
    </footer>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/security.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
